<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Allowed</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(180deg, #eef7f4 0%, #e4f1ed 100%);
            color: #1f2933;
        }
        .panel {
            width: min(720px, calc(100vw - 32px));
            padding: 28px;
            border-radius: 20px;
            background: #ffffff;
            border: 1px solid rgba(31, 41, 51, 0.12);
            box-shadow: 0 18px 42px rgba(31, 41, 51, 0.12);
        }
        a { color: #c7522a; }
    </style>
</head>
<body>
    <section class="panel">
        <h1>Upload allowed</h1>
        <p>This route points at the upload-enabled area. Use the main dashboard to POST or DELETE files under <strong>/uploads</strong>.</p>
        <p><a href="/">Back to the main dashboard</a></p>
    </section>
</body>
</html>
