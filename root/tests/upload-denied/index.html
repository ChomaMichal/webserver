<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Denied</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(180deg, #fff6f3 0%, #f7e8e2 100%);
            color: #1f2933;
        }
        .panel {
            width: min(720px, calc(100vw - 32px));
            padding: 28px;
            border-radius: 20px;
            background: #fff;
            border: 1px solid rgba(31, 41, 51, 0.12);
            box-shadow: 0 18px 42px rgba(31, 41, 51, 0.12);
        }
        strong { color: #c7522a; }
    </style>
</head>
<body>
    <section class="panel">
        <h1>Upload denied</h1>
        <p>This route is configured with upload disabled, so file creation attempts should fail with a permission-style response.</p>
        <p>Try the POST or DELETE buttons on the main dashboard against this route's path or use the upload directory instead.</p>
    </section>
</body>
</html>
