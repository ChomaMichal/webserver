server:
{
      listen 0.0.0.0:100
      server_name example.com
      root ./root/
      404 /errors/404.html
      401 /errors/401.html
      409 /errors/409.html
      405 /errors/405.html
      autoindex on
      index index.html
      upload on
      upload_location ./root/uploads
      max_payload_size 10485760
      location /api/hihi
      {
            return 301 /ap2p2
      }
      location /api2
      {
            return 301 /api/hihi
      }
      location /cgi
      {
            cgi_extension .py /usr/bin/cgi
      }
}