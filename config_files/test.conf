server:
{
	listen 127.0.0.1:8080
	server_name example.com
	default
	root /var/www/html
	404 /errors/404.html
	401 /errors/401.html
	409 /errors/409.html
	405 /errors/405.html
	autoindex on
	index index.html
	upload on
	upload_location /var/www/uploads
	max_payload_size 10485760
	return 301 https://secure.example.com
	location /api
	{
		root /var/www/api
		autoindex off
		upload off
		max_payload_size 5242880
	}
	location /static
	{
		root /var/www/static
		autoindex on
		404 /errors/static_404.html
	}
	location /admin
	{
		root /var/www/admin
		upload on
		upload_location /var/www/admin/uploads
		401 /errors/admin_401.html
	}
}
server:
{
	listen localhost:3000
	server_name api.example.com
	root /opt/api
	404 /error_pages/404.html
	401 /error_pages/401.html
	409 /error_pages/409.html
	405 /error_pages/405.html
	autoindex off
	index home.html
	upload off
	max_payload_size 2097152
	location /v1
	{
		root /opt/api/v1
		autoindex off
	}
	location /v2
	{
		root /opt/api/v2
		autoindex off
		max_payload_size 1048576
	}
}
server:
{
	listen 0.0.0.0:80
	server_name www.example.com
	root /srv/www
	404 /404.html
	401 /401.html
	409 /409.html
	405 /405.html
	autoindex off
	index index.php
	upload on
	upload_location /srv/uploads
	max_payload_size 20971520
	location /downloads
	{
		root /srv/downloads
		autoindex on
	}
  dasda
}
